version: '1'

networks:
  application:
    driver: bridge
    name: trofos-application

services:
  frontend:
    image: ghcr.io/project-trofos/trofos/frontend:main
    ports:
      - '${FRONTEND_PORT:-3000}:80'
    container_name: trofos-frontend-production
    restart: always
    links:
      - backend
    networks:
      - application
  api_gateway:
    image: ghcr.io/project-trofos/trofos/api_gateway:main
    ports:
      - '${API_GATEWAY_PORT:-3001}:80'
    container_name: trofos-api-gateway-production
    restart: always
    networks:
      - application
  backend:
    image: ghcr.io/project-trofos/trofos/backend:main
    ports:
      - '${BACKEND_PORT:-3003}:3003'
    container_name: trofos-backend-production
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - EMAIL_KEY=${EMAIL_KEY}
      - NODE_ENV=${NODE_ENV}
      - AWS_SES_FROM_EMAIL=${AWS_SES_FROM_EMAIL}
      - SP_PRIVATE_KEY_BASE64=${SP_PRIVATE_KEY_BASE64}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_DATABASE_URL=${AI_DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ENABLE_NUS_SSO=${ENABLE_NUS_SSO}
    depends_on:
      postgres:
        condition: service_healthy
    links:
      - postgres
    networks:
      - application
  hocus_pocus_server:
    image: ghcr.io/project-trofos/trofos/hocus_pocus_server:main
    ports:
      - '${HOCUS_POCUS_PORT:-3002}:3002'
    container_name: trofos-hocus-pocus-server-production
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BACKEND_URL=${BACKEND_URL}
    networks:
      - application
  ai_insight_worker:
    image: ghcr.io/project-trofos/trofos/ai_insight_worker:main
    container_name: trofos-ai-insight-worker-production
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=${REDIS_URL}
    networks:
      - application
  postgres:
    image: pgvector/pgvector:pg14
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    networks:
      - application
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    networks:
      - application
volumes:
  postgres:
